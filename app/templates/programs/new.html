{% extends "base.html" %}
{% block title %}New Program — PulseCore{% endblock %}

{% block breadcrumb %}
<a href="{{ url_for('programs.list_programs') }}" class="text-sm text-gray-500 hover:text-gray-700">Programs</a>
<span class="text-gray-400 mx-2">/</span>
<span class="text-sm font-medium text-gray-700">New Program</span>
{% endblock %}

{% block content %}
<div class="mb-6">
  <h1 class="text-2xl font-bold text-gray-900">New Program</h1>
  <p class="text-gray-500 text-sm mt-1">Programs group participants, grants, and indicators by sector.</p>
</div>

<form method="POST" class="max-w-2xl space-y-6">
  <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
    <div class="px-5 py-4 border-b border-gray-100"><h2 class="font-semibold text-gray-800">Program Details</h2></div>
    <div class="px-5 py-5 space-y-4">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="sm:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Program Name <span class="text-red-500">*</span></label>
          <input type="text" name="name" required placeholder="e.g. Primary Healthcare — South Region"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Program Code</label>
          <input type="text" name="code" placeholder="e.g. HLT-2025-SR"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Sector</label>
          <select name="sector" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
            <option value="">— Select sector —</option>
            {% for s in sectors %}
            <option value="{{ s }}">{{ s|replace('_',' ')|title }}</option>
            {% endfor %}
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Start Date</label>
          <input type="date" name="start_date"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">End Date</label>
          <input type="date" name="end_date"
                 class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div class="sm:col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
          <textarea name="description" rows="3" placeholder="What does this program aim to achieve?"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>
      </div>
    </div>
  </div>

  <div class="flex space-x-3">
    <a href="{{ url_for('programs.list_programs') }}"
       class="px-5 py-2.5 border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 transition-colors">Cancel</a>
    <button type="submit"
            class="px-5 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium transition-colors">Create Program</button>
  </div>
</form>
{% endblock %}
